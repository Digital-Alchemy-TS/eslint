name: Pull Request Checks

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: yarn config set enableImmutableInstalls false
      - run: yarn
      - run: yarn build
      - run: yarn lint
      - run: yarn test --coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  compatibility-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        eslint: [9, 10]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: corepack enable
      - run: yarn config set enableImmutableInstalls false
      - run: yarn
      - run: yarn add --dev eslint@${{ matrix.eslint }}
        env:
          ESLINT_VERSION: ${{ matrix.eslint }}
      - run: yarn build
      - run: yarn test

  # TODO(phase-b): add docs-drift gate once verified on Node 22.
  # Local verification ran on Node 24, where eslint-doc-generator's CJS require() of an ESM
  # module namespace returns { __esModule, default } instead of the plugin directly, causing
  # "Could not find exported `rules` object" (exit 1).  On Node 22 (the CI runner above)
  # require('.mjs') throws ERR_REQUIRE_ESM so the tool falls back to its ESM import() path
  # and loads the plugin correctly.  Add this job once Phase B lands its first rule and
  # local Node 22 verification is possible, or pin the job to node 22 explicitly.
